name: 🏗️ Nix Build & Cache

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  schedule:
    - cron: '30 0 * * 1' # Every Monday 06:00 IST (00:30 UTC)

permissions:
  contents: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────
  # Setup: update sources, generate build matrix
  # ──────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      linux_matrix: ${{ steps.set-matrix.outputs.linux }}
      macos_matrix: ${{ steps.set-matrix.outputs.macos }}
      has_changes: ${{ steps.diff.outputs.updated }}
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: https://github.com/DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-conf: |
            fallback = true
            sandbox = false
            http-connections = 128
            max-substitution-jobs = 128
            accept-flake-config = true
            extra-platforms = aarch64-linux
            substituters = https://nix-community.cachix.org?priority=41 https://numtide.cachix.org?priority=42 https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= numtide.cachix.org-1:2ps1kLBUWjxIneOy1Ik6cQjb41X0iXVXeHigGmycPPE=

      - name: Update flake.lock
        # if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: nix flake update

      - name: Update Nix fetchFrom sources
        # if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          grep -rlE 'fetch(From|url|git|tarball|zip|svn|hg)' --include='*.nix' . | while read -r f; do
            [ -f "$f" ] || continue
            echo "→ Updating $f"
            nix run nixpkgs#update-nix-fetchgit -- --only-commented "$f" || true
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "No updates found."
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Upload updated sources
        if: steps.diff.outputs.updated == 'true'
        uses: https://github.com/actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: updated-sources
          path: |
            flake.lock
            **/*.nix
          overwrite: true

      - name: Generate Job Matrix
        id: set-matrix
        run: |
          MATRIX_JSON=$(nix eval --json --impure --expr '
          let
            flake = builtins.getFlake (toString ./.);
            mkList = attrs: builtins.map (name: {
              host = name;
              platform = attrs.${name}.config.nixpkgs.system;
            }) (builtins.attrNames attrs);
          in
          {
            linux = mkList (flake.nixosConfigurations or {});
            macos = mkList (flake.darwinConfigurations or {});
          }
          ')
          echo "linux=$(echo $MATRIX_JSON | jq -c '.linux')" >> "$GITHUB_OUTPUT"
          echo "macos=$(echo $MATRIX_JSON | jq -c '.macos')" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────
  # Linux: build NixOS configurations and push to cache
  # ──────────────────────────────────────────────────────────
  linux-build:
    needs: setup
    if: fromJson(needs.setup.outputs.linux_matrix)[0] != null
    runs-on: nixos
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.linux_matrix) }}
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Download updated sources
        if: needs.setup.outputs.has_changes == 'true'
        uses: https://github.com/actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: updated-sources
          path: .
          merge-multiple: true

      - name: Setup Attic cache
        uses: https://github.com/ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
        with:
          endpoint: https://atticfly.fly.dev/
          cache: system
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Build System
        run: |
          OUT_PATHS=$(nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --system ${{ matrix.platform }} --print-out-paths)
          attic push system $OUT_PATHS

      - name: Build DevShell
        run: |
          nix develop .# --profile dev-profile --command true --system ${{ matrix.platform }}
          attic push system dev-profile

  # ──────────────────────────────────────────────────────────
  # macOS: evaluate Darwin configurations (dry run)
  # ──────────────────────────────────────────────────────────
  macos-evaluate:
    needs: setup
    if: fromJson(needs.setup.outputs.macos_matrix)[0] != null
    runs-on: nixos
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.macos_matrix) }}
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download updated sources
        if: needs.setup.outputs.has_changes == 'true'
        uses: https://github.com/actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: updated-sources
          path: .
          merge-multiple: true

      - name: Evaluate macOS Configuration (Dry Run)
        run: nix eval .#darwinConfigurations.${{ matrix.host }}.config.system.build.toplevel.drvPath

  # ──────────────────────────────────────────────────────────
  # Commit: auto-commit updates after all builds pass
  # ──────────────────────────────────────────────────────────
  commit-changes:
    needs: [setup, linux-build, macos-evaluate]
    if: |
      always() &&
      needs.setup.outputs.has_changes == 'true' &&
      (needs.linux-build.result == 'success' || needs.linux-build.result == 'skipped') &&
      (needs.macos-evaluate.result == 'success' || needs.macos-evaluate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Download updated sources
        uses: https://github.com/actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: updated-sources
          path: .
          merge-multiple: true

      - name: Import GPG key
        uses: https://github.com/crazy-max/ghaction-import-gpg@cb9bde77f209b9df9e1e12ef7dffc105498d2d17 # v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Push changes
        uses: https://github.com/stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: '⬆️ chore(nix): update flake inputs and package sources'
          commit_options: -S --no-verify --signoff
          branch: master
          file_pattern: 'flake.lock **/*.nix'
